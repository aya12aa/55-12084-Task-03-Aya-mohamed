services:
  postgres:
    image: postgres:17
    container_name: task03-postgres
    environment:
      POSTGRES_DB: task03db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task03db"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: 55-12084_container
    ports:
      - "12084:8080"
    environment:
      USER_NAME: Compose_Aya_Mohamed
      ID: Compose_55_12084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/task03db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: